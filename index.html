<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Simplifié | Congo Pétrole</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .card { background: #1e293b; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #334155; }
        .btn-v { background: #22c55e; color: white; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 12px; }
        .btn-r { background: #ef4444; color: white; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 12px; }
        .badge { background: #f59e0b; color: black; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body class="p-5">

    <h1 class="text-xl font-bold mb-6 text-amber-500 italic">CONGO PÉTROLE - GESTION DES FLUX</h1>

    <div class="mb-10">
        <h2 class="text-sm uppercase tracking-widest mb-4 text-slate-400">📥 Recharges à valider</h2>
        <div id="list-recharges"></div>
    </div>

    <div class="mb-10">
        <h2 class="text-sm uppercase tracking-widest mb-4 text-slate-400">📤 Retraits à payer</h2>
        <div id="list-retraits"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://firstsolar-e2ba3-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- GÉRER LES RECHARGES ---
        onValue(ref(db, 'congo_petrole/recharges'), (snap) => {
            const data = snap.val();
            const container = document.getElementById('list-recharges');
            container.innerHTML = "";
            if(!data) return container.innerHTML = "<p class='text-slate-500 text-xs'>Aucune recharge.</p>";

            Object.keys(data).forEach(id => {
                const r = data[id];
                if(r.statut === "En attente") {
                    container.innerHTML += `
                        <div class="card flex justify-between items-center">
                            <div>
                                <p class="font-bold text-lg">${r.montant} FC</p>
                                <p class="text-xs text-slate-400">Client: ${r.phone}</p>
                                <p class="text-[10px] text-amber-500">Réf: ${r.transactionId || 'N/A'}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="validerRecharge('${id}', '${r.phone}', ${r.montant})" class="btn-v">VALIDER</button>
                                <button onclick="supprimerDemande('recharges', '${id}')" class="btn-r">X</button>
                            </div>
                        </div>`;
                }
            });
        });

        window.validerRecharge = async (id, phone, montant) => {
            const userRef = ref(db, `congo_petrole/users/${phone}`);
            const snap = await get(userRef);
            if(snap.exists()){
                const nouveauSolde = (Number(snap.val().balance) || 0) + Number(montant);
                await update(userRef, { balance: nouveauSolde });
                await update(ref(db, `congo_petrole/recharges/${id}`), { statut: "Terminé" }); // Disparaît car le statut change
                alert("Recharge effectuée !");
            }
        };

        // --- GÉRER LES RETRAITS ---
        onValue(ref(db, 'congo_petrole/retraits'), (snap) => {
            const data = snap.val();
            const container = document.getElementById('list-retraits');
            container.innerHTML = "";
            if(!data) return container.innerHTML = "<p class='text-slate-500 text-xs'>Aucun retrait.</p>";

            Object.keys(data).forEach(id => {
                const r = data[id];
                if(r.statut === "En attente") {
                    container.innerHTML += `
                        <div class="card flex justify-between items-center border-red-900/30">
                            <div>
                                <p class="font-bold text-lg text-red-400">${r.montant} FC</p>
                                <p class="text-xs text-slate-400">Vers: ${r.phone}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="validerRetrait('${id}')" class="btn-v" style="background:#475569">PAYÉ</button>
                                <button onclick="supprimerDemande('retraits', '${id}')" class="btn-r">X</button>
                            </div>
                        </div>`;
                }
            });
        });

        window.validerRetrait = async (id) => {
            await update(ref(db, `congo_petrole/retraits/${id}`), { statut: "Payé" });
            alert("Retrait marqué comme payé !");
        };

        window.supprimerDemande = async (path, id) => {
            if(confirm("Supprimer cette demande ?")) {
                await remove(ref(db, `congo_petrole/${path}/${id}`));
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Congo Pétrole | Gestion Financière</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --gold: #f59e0b; --oil-black: #020617; }
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; }
        .tab-active { border-bottom: 3px solid var(--gold); color: var(--gold); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-[#020617] text-white p-5 flex justify-between items-center shadow-xl">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-shield-halved text-amber-500"></i>
            <h1 class="font-black uppercase italic tracking-tighter">Congo Pétrole <span class="text-amber-500">Admin</span></h1>
        </div>
        <div class="flex gap-6 text-xs font-bold uppercase">
            <button onclick="switchTab('users')" id="btn-users" class="tab-active py-2">Partenaires</button>
            <button onclick="switchTab('requests')" id="btn-requests" class="py-2">Demandes (Dépôts/Retraits)</button>
        </div>
    </nav>

    <div class="p-4 md:p-8">
        
        <div id="section-users" class="space-y-6">
            <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-200">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 text-[10px] uppercase font-black text-slate-400">
                        <tr>
                            <th class="p-4">Téléphone</th>
                            <th class="p-4">Solde Actuel</th>
                            <th class="p-4">VIP</th>
                            <th class="p-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody" class="text-sm"></tbody>
                </table>
            </div>
        </div>

        <div id="section-requests" class="hidden space-y-8">
            
            <div class="bg-white rounded-2xl shadow-lg border border-amber-200">
                <div class="p-4 bg-amber-50 border-b border-amber-100 flex justify-between items-center">
                    <h2 class="font-black uppercase italic text-amber-800 text-sm"><i class="fa-solid fa-money-bill-down mr-2"></i> Attente de Recharges</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-[9px] uppercase text-slate-400 bg-slate-50">
                            <tr>
                                <th class="p-4">Client</th>
                                <th class="p-4">Montant</th>
                                <th class="p-4">Preuve / ID</th>
                                <th class="p-4">Action</th>
                            </tr>
                        </thead>
                        <tbody id="rechargeTableBody" class="text-xs"></tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-lg border border-red-200">
                <div class="p-4 bg-red-50 border-b border-red-100">
                    <h2 class="font-black uppercase italic text-red-800 text-sm"><i class="fa-solid fa-money-bill-up mr-2"></i> Demandes de Retrait</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-[9px] uppercase text-slate-400 bg-slate-50">
                            <tr>
                                <th class="p-4">Client</th>
                                <th class="p-4">Montant</th>
                                <th class="p-4">Status</th>
                                <th class="p-4">Action</th>
                            </tr>
                        </thead>
                        <tbody id="withdrawalTableBody" class="text-xs"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://firstsolar-e2ba3-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Navigation entre onglets
        window.switchTab = (tab) => {
            document.getElementById('section-users').classList.toggle('hidden', tab !== 'users');
            document.getElementById('section-requests').classList.toggle('hidden', tab !== 'requests');
            document.getElementById('btn-users').classList.toggle('tab-active', tab === 'users');
            document.getElementById('btn-requests').classList.toggle('tab-active', tab === 'requests');
        };

        // 1. Charger Utilisateurs
        onValue(ref(db, 'congo_petrole/users'), (snap) => {
            const users = snap.val();
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = "";
            if(users) {
                Object.keys(users).forEach(phone => {
                    const u = users[phone];
                    tbody.innerHTML += `
                        <tr class="border-b border-slate-100">
                            <td class="p-4 font-bold text-slate-700">${phone}</td>
                            <td class="p-4 font-black text-green-600">${(u.balance || 0).toLocaleString()} FC</td>
                            <td class="p-4 text-[10px] font-black uppercase text-amber-500">${u.vipActive ? 'VIP '+u.vipActive : '-'}</td>
                            <td class="p-4">
                                <button onclick="window.editBal('${phone}', ${u.balance || 0})" class="bg-slate-800 text-white px-3 py-1 rounded-lg text-[10px]">Ajuster</button>
                            </td>
                        </tr>
                    `;
                });
            }
        });

        // 2. Charger Recharges (Dépôts)
        onValue(ref(db, 'congo_petrole/recharges'), (snap) => {
            const reqs = snap.val();
            const tbody = document.getElementById('rechargeTableBody');
            tbody.innerHTML = "";
            if(reqs) {
                Object.keys(reqs).forEach(id => {
                    const r = reqs[id];
                    if(r.status === "en_attente") {
                        tbody.innerHTML += `
                            <tr class="border-b border-amber-50">
                                <td class="p-4 font-bold">${r.userPhone}</td>
                                <td class="p-4 font-black text-amber-600">${r.amount.toLocaleString()} FC</td>
                                <td class="p-4 text-slate-500">${r.proofId || 'N/A'}</td>
                                <td class="p-4 flex gap-2">
                                    <button onclick="approveRecharge('${id}', '${r.userPhone}', ${r.amount})" class="bg-green-500 text-white px-3 py-1 rounded shadow">Approuver</button>
                                    <button onclick="rejectRequest('recharges', '${id}')" class="bg-red-100 text-red-600 px-3 py-1 rounded">Refuser</button>
                                </td>
                            </tr>
                        `;
                    }
                });
            }
        });

        // FONCTION : Approuver Recharge
        window.approveRecharge = async (id, phone, amount) => {
            const userRef = ref(db, `congo_petrole/users/${phone}`);
            const snapshot = await get(userRef);
            if (snapshot.exists()) {
                const currentBalance = snapshot.val().balance || 0;
                const newBalance = currentBalance + amount;
                
                // Mettre à jour le solde et marquer la demande comme validée
                await update(userRef, { balance: newBalance });
                await update(ref(db, `congo_petrole/recharges/${id}`), { status: "valide" });
                alert("Compte rechargé avec succès !");
            }
        };

        // 3. Charger Retraits
        onValue(ref(db, 'congo_petrole/retraits'), (snap) => {
            const reqs = snap.val();
            const tbody = document.getElementById('withdrawalTableBody');
            tbody.innerHTML = "";
            if(reqs) {
                Object.keys(reqs).forEach(id => {
                    const r = reqs[id];
                    if(r.status === "en_attente") {
                        tbody.innerHTML += `
                            <tr class="border-b border-red-50">
                                <td class="p-4 font-bold">${r.userPhone}</td>
                                <td class="p-4 font-black text-red-600">${r.amount.toLocaleString()} FC</td>
                                <td class="p-4 text-slate-400 italic">Paiement manuel requis</td>
                                <td class="p-4">
                                    <button onclick="approveWithdrawal('${id}')" class="bg-slate-900 text-white px-3 py-1 rounded shadow">Marquer comme Payé</button>
                                </td>
                            </tr>
                        `;
                    }
                });
            }
        });

        window.approveWithdrawal = (id) => {
            update(ref(db, `congo_petrole/retraits/${id}`), { status: "complete" });
            alert("Retrait marqué comme terminé.");
        };

        window.rejectRequest = (path, id) => {
            if(confirm("Refuser cette demande ?")) {
                remove(ref(db, `congo_petrole/${path}/${id}`));
            }
        };

        window.editBal = (phone, current) => {
            const add = prompt(`Modifier solde de ${phone} (Actuel: ${current}):`, "0");
            if(add) update(ref(db, `congo_petrole/users/${phone}`), { balance: current + parseFloat(add) });
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Flux | Congo Pétrole</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .card { background: #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #334155; }
        .btn-green { background: #22c55e; color: white; padding: 8px 15px; border-radius: 6px; font-weight: bold; font-size: 11px; uppercase; }
        .btn-red { background: #ef4444; color: white; padding: 8px 12px; border-radius: 6px; font-weight: bold; font-size: 11px; }
    </style>
</head>
<body class="p-4">

    <h1 class="text-lg font-black mb-6 text-amber-500 italic uppercase tracking-tighter">Congo Pétrole — Gestion</h1>

    <div class="mb-8">
        <h2 class="text-[10px] uppercase tracking-widest mb-3 text-slate-500 font-bold">📥 Attente de Recharge</h2>
        <div id="list-recharges"></div>
    </div>

    <div class="mb-8">
        <h2 class="text-[10px] uppercase tracking-widest mb-3 text-slate-500 font-bold">📤 Attente de Paiement</h2>
        <div id="list-retraits"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://firstsolar-e2ba3-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- GESTION DES RECHARGES ---
        onValue(ref(db, 'congo_petrole/recharges'), (snap) => {
            const data = snap.val();
            const container = document.getElementById('list-recharges');
            container.innerHTML = "";
            if(!data) return;

            Object.keys(data).forEach(id => {
                const r = data[id];
                if(r.statut === "En attente") {
                    container.innerHTML += `
                        <div class="card flex justify-between items-center">
                            <div>
                                <p class="text-green-400 font-black text-base">${Number(r.montant).toLocaleString()} FC</p>
                                <p class="text-[11px] text-slate-300">${r.phone}</p>
                                <p class="text-[9px] text-slate-500">Réf: ${r.transactionId || '---'}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="validerRecharge('${id}', '${r.phone}', ${r.montant})" class="btn-green">VALIDER</button>
                                <button onclick="supprimer('recharges', '${id}')" class="btn-red">X</button>
                            </div>
                        </div>`;
                }
            });
        });

        window.validerRecharge = async (id, phone, montant) => {
            if(!confirm("Créditer " + montant + " FC sur le compte " + phone + " ?")) return;
            
            const userRef = ref(db, `congo_petrole/users/${phone}`);
            const snap = await get(userRef);
            
            if(snap.exists()){
                // AJOUT DU SOLDE (Calcul mathématique)
                const soldeActuel = Number(snap.val().balance) || 0;
                const nouveauSolde = soldeActuel + Number(montant);
                
                await update(userRef, { balance: nouveauSolde });
                // Changement de statut pour faire disparaître la ligne
                await update(ref(db, `congo_petrole/recharges/${id}`), { statut: "Validé" });
                alert("Succès : + " + montant + " FC ajoutés.");
            } else {
                alert("Erreur : Utilisateur introuvable.");
            }
        };

        // --- GESTION DES RETRAITS ---
        onValue(ref(db, 'congo_petrole/retraits'), (snap) => {
            const data = snap.val();
            const container = document.getElementById('list-retraits');
            container.innerHTML = "";
            if(!data) return;

            Object.keys(data).forEach(id => {
                const r = data[id];
                if(r.statut === "En attente") {
                    container.innerHTML += `
                        <div class="card flex justify-between items-center">
                            <div>
                                <p class="text-red-400 font-black text-base">${Number(r.montant).toLocaleString()} FC</p>
                                <p class="text-[11px] text-slate-300">Dest : ${r.phone}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="validerRetrait('${id}')" class="btn-green" style="background:#475569">PAYÉ</button>
                                <button onclick="supprimer('retraits', '${id}')" class="btn-red">X</button>
                            </div>
                        </div>`;
                }
            });
        });

        window.validerRetrait = async (id) => {
            if(!confirm("Marquer ce retrait comme payé ?")) return;
            await update(ref(db, `congo_petrole/retraits/${id}`), { statut: "Terminé" });
        };

        window.supprimer = async (path, id) => {
            if(confirm("Supprimer définitivement ?")) {
                await remove(ref(db, `congo_petrole/${path}/${id}`));
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Congo Pétrole | Console de Gestion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --gold: #f59e0b; --oil-black: #020617; }
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; }
        .tab-active { border-bottom: 3px solid var(--gold); color: var(--gold); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-[#020617] text-white p-5 flex justify-between items-center shadow-2xl sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-shield-halved text-amber-500 text-xl"></i>
            <h1 class="font-black uppercase italic tracking-tighter">Congo Pétrole <span class="text-amber-500 text-xs">ADMIN</span></h1>
        </div>
        <div class="flex gap-6 text-[10px] font-black uppercase tracking-widest">
            <button onclick="switchTab('users')" id="btn-users" class="tab-active py-2 transition-all">Partenaires</button>
            <button onclick="switchTab('requests')" id="btn-requests" class="py-2 transition-all">Demandes</button>
        </div>
    </nav>

    <div class="p-4 md:p-8 max-w-7xl mx-auto">
        
        <div id="section-users" class="space-y-6">
            <h2 class="text-xs font-black uppercase text-slate-400 tracking-widest mb-4">Base de données clients</h2>
            <div class="bg-white rounded-3xl overflow-hidden border border-slate-200 card-shadow">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 text-[10px] uppercase font-black text-slate-400 border-b">
                        <tr>
                            <th class="p-5">Téléphone</th>
                            <th class="p-5">Solde (FC)</th>
                            <th class="p-5">Gisement Actif</th>
                            <th class="p-5 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody" class="text-sm divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>

        <div id="section-requests" class="hidden space-y-10">
            <div class="bg-white rounded-3xl overflow-hidden border border-amber-200 card-shadow">
                <div class="p-5 bg-amber-50/50 border-b border-amber-100 flex justify-between items-center">
                    <h2 class="font-black uppercase italic text-amber-800 text-xs tracking-widest">
                        <i class="fa-solid fa-money-bill-transfer mr-2"></i> Attente de validation (Recharges)
                    </h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-[9px] uppercase text-slate-400 bg-slate-50 font-black">
                            <tr>
                                <th class="p-5">Client</th>
                                <th class="p-5">Montant</th>
                                <th class="p-5">Réf / Preuve</th>
                                <th class="p-5">Décision</th>
                            </tr>
                        </thead>
                        <tbody id="rechargeTableBody" class="text-xs divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white rounded-3xl overflow-hidden border border-red-200 card-shadow">
                <div class="p-5 bg-red-50 border-b border-red-100">
                    <h2 class="font-black uppercase italic text-red-800 text-xs tracking-widest">
                        <i class="fa-solid fa-hand-holding-dollar mr-2"></i> Sortie de fonds (Retraits)
                    </h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-[9px] uppercase text-slate-400 bg-slate-50 font-black">
                            <tr>
                                <th class="p-5">Client</th>
                                <th class="p-5">Montant</th>
                                <th class="p-5">Status</th>
                                <th class="p-5">Action</th>
                            </tr>
                        </thead>
                        <tbody id="withdrawalTableBody" class="text-xs divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://firstsolar-e2ba3-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // SYSTÈME D'ONGLETS
        window.switchTab = (tab) => {
            document.getElementById('section-users').classList.toggle('hidden', tab !== 'users');
            document.getElementById('section-requests').classList.toggle('hidden', tab !== 'requests');
            document.getElementById('btn-users').classList.toggle('tab-active', tab === 'users');
            document.getElementById('btn-requests').classList.toggle('tab-active', tab === 'requests');
        };

        // 1. CHARGEMENT DES UTILISATEURS
        onValue(ref(db, 'congo_petrole/users'), (snap) => {
            const users = snap.val();
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = "";
            if(users) {
                Object.keys(users).forEach(phone => {
                    const u = users[phone];
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="p-5 font-bold text-slate-700">${phone}</td>
                            <td class="p-5 font-black text-green-600 italic">${(Number(u.balance) || 0).toLocaleString()} FC</td>
                            <td class="p-5 text-[10px] font-black uppercase text-amber-500">
                                ${u.vipActive ? '<span class="bg-amber-100 px-2 py-1 rounded">VIP ' + u.vipActive + '</span>' : '-'}
                            </td>
                            <td class="p-5 text-center">
                                <button onclick="window.editBal('${phone}', ${u.balance || 0})" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase hover:bg-black">Ajuster</button>
                            </td>
                        </tr>
                    `;
                });
            }
        });

        // 2. CHARGEMENT DES RECHARGES
        onValue(ref(db, 'congo_petrole/recharges'), (snap) => {
            const reqs = snap.val();
            const tbody = document.getElementById('rechargeTableBody');
            tbody.innerHTML = "";
            if(reqs) {
                Object.keys(reqs).forEach(id => {
                    const r = reqs[id];
                    if(r.statut === "En attente") {
                        tbody.innerHTML += `
                            <tr class="border-b border-amber-50">
                                <td class="p-5 font-bold">${r.phone}</td>
                                <td class="p-5 font-black text-amber-600">${(Number(r.montant) || 0).toLocaleString()} FC</td>
                                <td class="p-5 text-slate-500">
                                    <p class="font-bold text-slate-800 uppercase text-[10px]">ID: ${r.transactionId || '?'}</p>
                                    <p class="text-[10px]">Exp: ${r.expediteur || '?'}</p>
                                </td>
                                <td class="p-5 flex gap-2">
                                    <button onclick="approveRecharge('${id}', '${r.phone}', ${r.montant})" class="bg-green-600 text-white px-3 py-2 rounded-lg font-bold text-[10px] uppercase shadow-md shadow-green-100">VALIDER</button>
                                    <button onclick="rejectRequest('recharges', '${id}')" class="bg-red-50 text-red-500 px-3 py-2 rounded-lg font-bold text-[10px] uppercase">REFUSER</button>
                                </td>
                            </tr>
                        `;
                    }
                });
            }
        });

        // ACTION : APPROUVER RECHARGE
        window.approveRecharge = async (id, phone, montant) => {
            if(!confirm("Confirmez-vous la réception de " + montant + " FC ?")) return;
            
            const userRef = ref(db, `congo_petrole/users/${phone}`);
            const rechargeRef = ref(db, `congo_petrole/recharges/${id}`);

            try {
                const snapshot = await get(userRef);
                if (snapshot.exists()) {
                    // CALCUL MATHÉMATIQUE FORCÉ
                    const currentBalance = Number(snapshot.val().balance) || 0;
                    const amountToAdd = Number(montant);
                    const newBalance = currentBalance + amountToAdd;
                    
                    // 1. Mise à jour du solde
                    await update(userRef, { balance: newBalance });
                    // 2. Changement de statut (fait disparaître la ligne instantanément)
                    await update(rechargeRef, { statut: "Validée" });
                    
                    alert("Compte crédité ! Nouveau solde: " + newBalance.toLocaleString() + " FC");
                } else {
                    alert("Erreur : Utilisateur introuvable.");
                }
            } catch (e) { alert("Erreur Firebase : " + e.message); }
        };

        // 3. CHARGEMENT DES RETRAITS
        onValue(ref(db, 'congo_petrole/retraits'), (snap) => {
            const reqs = snap.val();
            const tbody = document.getElementById('withdrawalTableBody');
            tbody.innerHTML = "";
            if(reqs) {
                Object.keys(reqs).forEach(id => {
                    const r = reqs[id];
                    if(r.statut === "En attente") {
                        tbody.innerHTML += `
                            <tr class="border-b border-red-50">
                                <td class="p-5 font-bold">${r.phone || 'Inconnu'}</td>
                                <td class="p-5 font-black text-red-600">${(Number(r.montant) || 0).toLocaleString()} FC</td>
                                <td class="p-5 text-[9px] font-bold text-slate-400 uppercase italic tracking-tighter">Paiement Manuel</td>
                                <td class="p-5">
                                    <button onclick="approveWithdrawal('${id}')" class="bg-[#020617] text-white px-4 py-2 rounded-lg font-black text-[10px] uppercase">Payé</button>
                                </td>
                            </tr>
                        `;
                    }
                });
            }
        });

        window.approveWithdrawal = async (id) => {
            if(confirm("Confirmer que le transfert manuel a été effectué ?")) {
                await update(ref(db, `congo_petrole/retraits/${id}`), { statut: "Terminé" });
                alert("Retrait marqué comme terminé.");
            }
        };

        window.rejectRequest = async (path, id) => {
            if(confirm("Supprimer définitivement cette demande ?")) {
                await remove(ref(db, `congo_petrole/${path}/${id}`));
            }
        };

        window.editBal = async (phone, current) => {
            const add = prompt(`Modifier solde de ${phone}\nActuel: ${current} FC\nAjouter (ex: 500) ou Retirer (ex: -500) :`, "0");
            if(add && !isNaN(add)) {
                const newTotal = Number(current) + Number(add);
                await update(ref(db, `congo_petrole/users/${phone}`), { balance: newTotal });
            }
        };
    </script>
</body>
</html>
